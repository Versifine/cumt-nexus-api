services:
  mysql:
    image: mysql:8.0.35
    container_name: cumt-nexus-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-cumt_nexus_db}
      MYSQL_USER: ${DB_USER:-nexus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nexuspassword}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7.2.3-alpine
    container_name: cumt-nexus-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
