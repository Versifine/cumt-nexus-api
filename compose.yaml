services:
  postgres:
    image: postgres:16
    container_name: cumt-nexus-postgres
    environment:
      POSTGRES_DB: cumt_nexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d cumt_nexus" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
